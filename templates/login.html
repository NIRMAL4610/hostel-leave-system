<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-weight: 500;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.4);
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 35px;
            cursor: pointer;
            font-size: 14px;
            color: #2a5298;
        }

        .captcha-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .captcha-text {
            font-weight: bold;
            font-size: 18px;
            background: #eee;
            padding: 5px 10px;
            border-radius: 5px;
            letter-spacing: 2px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #1e3c72;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h2>🔐 Student Login</h2>

    <form method="POST" onsubmit="return validateCaptcha()">

        <div class="input-group">
            <label>Register Number</label>
            <input type="text" name="regno" placeholder="Enter Reg No" required>
        </div>

        <div class="input-group password-box">
            <label>Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required>
            <span class="toggle" onclick="togglePassword()">👁️</span>
        </div>

        <!-- CAPTCHA -->
        <div class="input-group">
            <label>Enter Captcha</label>

            <div class="captcha-box">
                <span id="captcha" class="captcha-text"></span>
                <button type="button" onclick="generateCaptcha()">↻</button>
            </div>

            <input type="text" id="captchaInput" placeholder="Enter Captcha" required>
        </div>

        <div id="error" class="error"></div>

        <button type="submit">Login</button>

    </form>

</div>

<script>
function togglePassword() {
    let pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}

// CAPTCHA
let currentCaptcha = "";

function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    currentCaptcha = "";

    for (let i = 0; i < 5; i++) {
        currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("captcha").innerText = currentCaptcha;
}

function validateCaptcha() {
    let userInput = document.getElementById("captchaInput").value;
    let errorBox = document.getElementById("error");

    if (userInput !== currentCaptcha) {
        errorBox.innerText = "❌ Incorrect Captcha";
        generateCaptcha();
        return false;
    }

    return true;
}

// Generate on load
window.onload = generateCaptcha;
</script>

</body>
</html>
