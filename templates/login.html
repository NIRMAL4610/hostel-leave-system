<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 35px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 20px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 34px;
            cursor: pointer;
        }

        .captcha-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }

        .captcha-text {
            background: white;
            color: black;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .refresh-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }

        @media (max-width: 400px) {
            .login-box {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>🔐 Student Login</h2>

    <form method="POST" onsubmit="return validateCaptcha()">

        <div class="input-group">
            <label>Register Number</label>
            <input type="text" name="regno" placeholder="Enter Reg No" required>
        </div>

        <div class="input-group password-box">
            <label>Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required>
            <span class="toggle" onclick="togglePassword()">👁️</span>
        </div>

        <!-- CAPTCHA -->
        <div class="input-group">
            <label>Enter Captcha</label>

            <div class="captcha-box">
                <span id="captcha" class="captcha-text"></span>
                <button type="button" class="refresh-btn" onclick="generateCaptcha()">↻</button>
            </div>

            <input type="text" id="captchaInput" placeholder="Enter Captcha" required>
        </div>

        <div id="error" class="error">
            {% if error %}
                {{ error }}
            {% endif %}
        </div>

        <button type="submit">Login</button>

    </form>

</div>

<script>
function togglePassword() {
    let pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}

let currentCaptcha = "";

function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    currentCaptcha = "";

    for (let i = 0; i < 5; i++) {
        currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("captcha").innerText = currentCaptcha;
}

function validateCaptcha() {
    let userInput = document.getElementById("captchaInput").value;
    let errorBox = document.getElementById("error");

    if (userInput !== currentCaptcha) {
        errorBox.innerText = "❌ Incorrect Captcha";
        generateCaptcha();
        return false;
    }

    return true;
}

// Clear error while typing
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("captchaInput").addEventListener("input", () => {
        document.getElementById("error").innerText = "";
    });
});

// Generate captcha on load
window.onload = generateCaptcha;
</script>

</body>
</html>
